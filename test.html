<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animated Menu</title>
    <link rel="stylesheet" href="nav.css">
</head>

<body>
    <header>
        <section class="header-title-line">
            <h1> Client Logo</h1>
            <button class="menu-button">
                <div class="menu-icon"></div>
            </button>
        </section>

        <nav>
            <ul>
                <li><a href="products.html">Products</a></li>
                <li><a href="#">Forum</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>
<style>

/* Reset default margin/padding and set box-sizing */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Define CSS variables for consistent theming */
:root {
    --HEADER-BGCOLOR: limegreen;
    --HEADER-COLOR: whitesmoke;
}

/* Set base font size and font family */
html {
    font-size: 1.5rem;
    font-family: 'Nunito', sans-serif;
}

/* Make body take full height and layout children vertically */
body {
    min-height: 100vh;
    display: flex;
    flex-flow: column nowrap;
}

/* Style header background and text color using variables */
header {
    background-color: var(--HEADER-BGCOLOR);
    color: var(--HEADER-COLOR);
}

/* Layout for title line inside header */
.header-title-line {
    padding: 0.25rem 0.5rem;
    display: flex;
    flex-flow: row nowrap;
    justify-content: space-between;
}

/* Style the menu button container */
.menu-button {
    background-color: transparent;
    border: none;
    width: 48px;
    height: 48px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative; /* Enables positioning of child elements */
}

/* Style the hamburger icon (main line and pseudo-elements) */
.menu-icon,
.menu-icon::before,
.menu-icon::after {
    background-color: var(--HEADER-COLOR);
    width: 40px;
    height: 5px;
    border-radius: 5px;
    position: absolute;
    transition: all 0.5s;
}

/* Create top and bottom lines for hamburger menu */
.menu-icon::before,
.menu-icon::after {
    content: "";
}

/* Position the top line above the main line */
.menu-icon::before {
    transform: translate(-20px, -12px);
}

/* Position the bottom line below the main line */
.menu-icon::after {
    transform: translate(-20px, 12px);
}

/* Animate menu icon into 'X' on hover/focus */
:is(header:hover, header:focus-within) .menu-icon {
    background-color: transparent; /* Hide the middle line */
    
}

/* Rotate top line to create 'X' shape */
:is(header:hover, header:focus-within) .menu-icon::before {
    transform: translateX(-20px) rotate(45deg);
}

/* Rotate bottom line to complete the 'X' */
:is(header:hover, header:focus-within) .menu-icon::after {
    transform: translateX(-20px) rotate(-45deg);
}

/* Show nav menu when header is hovered/focused */
:is(header:hover, header:focus-within) nav {
    display: block;
}

/* Initially hide the nav menu; animate its appearance */
nav {
    background-color: var(--HEADER-BGCOLOR);
    display: none;
    transform-origin: top center;
    animation: showMenu 0.5s ease-in-out forwards;
}

/* Animation for dropdown effect */
@keyframes showMenu {
    0% {
        transform: scaleY(0); /* Start invisible */
    }

    80% {
        transform: scaleY(1.2); /* Slight overshoot for bounce */
    }

    100% {
        transform: scaleY(1); /* Final position */
    }
}

/* Style navigation list container */
nav ul {
    list-style-type: none;
    display: flex;
    flex-flow: column nowrap;
}

/* Style each navigation item */
nav li {
    padding: 0.5rem;
    border-top: 1px solid var(--HEADER-COLOR);
}

/* Center navigation links and make them block-level */
nav a {
    display: block;
    text-align: center;
    width: 80%;
    margin: auto;
}

/* Style all link states */
nav a:any-link {
    color: var(--HEADER-COLOR);
    font-weight: bold;
    text-decoration: none;
}

/* Scale links slightly on hover/focus for interaction feedback */
nav a:hover,
nav a:focus {
    transform: scale(1.2);
    transition: all 0.3s;
}

</style>
